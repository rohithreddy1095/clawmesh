schema_version: "0.1"
status: "placeholder"
note: "Approximate positions for 3D rendering. Replace with measured values after field survey."
needs_field_validation: true

coordinate_system:
  type: "farm_local_meters"
  origin_label: "Pump house NE corner (assumed)"
  axes:
    x: "East"
    y: "Up"
    z: "South"
  geo_anchor:
    lat: null               # ≈ 29.37°N Shamli (approximate, not measured)
    lon: null               # ≈ 77.30°E Shamli (approximate, not measured)
    bearing_deg: null       # rotation from farm-X to true east
  farm_bounds:
    x_min: 0
    x_max: 200              # ~10 acres ≈ 200m × 200m (rough square assumption)
    z_min: 0
    z_max: 200

zones:
  - zone_id: "z-water-infra"
    polygon: [[0,0], [20,0], [20,25], [0,25]]
    elevation_base: 0
    color: "#3B82F6"         # blue
    opacity: 0.25

  - zone_id: "z-food-forest-core"
    polygon: [[25,30], [160,30], [160,150], [25,150]]
    elevation_base: 0
    layer_heights:
      canopy_top: 12
      subcanopy_top: 6
      shrub_top: 2.5
      ground_top: 0.5
    color: "#22C55E"         # green
    opacity: 0.15

  - zone_id: "z-flower-production"
    polygon: [[25,155], [100,155], [100,190], [25,190]]
    elevation_base: 0
    layer_heights:
      shrub_top: 1.5
      ground_top: 0.3
    color: "#F59E0B"         # amber
    opacity: 0.2

  - zone_id: "z-rice-or-seasonal-grain"
    polygon: [[105,155], [180,155], [180,190], [105,190]]
    elevation_base: 0
    layer_heights:
      ground_top: 1.0
    color: "#84CC16"         # lime
    opacity: 0.2

  - zone_id: "z-compost-inputs"
    polygon: [[165,30], [195,30], [195,70], [165,70]]
    elevation_base: 0
    color: "#A16207"         # brown
    opacity: 0.25

  - zone_id: "z-nursery-grafting-trials"
    polygon: [[165,75], [195,75], [195,120], [165,120]]
    elevation_base: 0
    layer_heights:
      shrub_top: 2.0
      ground_top: 0.5
    color: "#8B5CF6"         # purple
    opacity: 0.2

  - zone_id: "z-harvest-packing"
    polygon: [[165,125], [195,125], [195,150], [165,150]]
    elevation_base: 0
    color: "#EC4899"         # pink
    opacity: 0.25

  - zone_id: "z-beekeeping-pollinators"
    polygon: [[140,5], [170,5], [170,25], [140,25]]
    elevation_base: 0
    color: "#FBBF24"         # yellow
    opacity: 0.2

assets:
  - asset_id: "pump-main-01"
    type: "pump"
    position: [8, 0, 10]
    model_hint: "pump_submersible"
    zone_id: "z-water-infra"

  - asset_id: "tank-01"
    type: "tank_overhead"
    position: [12, 0, 15]
    dimensions:
      diameter_m: 3
      height_m: 2.5
    zone_id: "z-water-infra"

  - asset_id: "filter-01"
    type: "filter"
    position: [10, 0, 12]
    zone_id: "z-water-infra"

  - asset_id: "manifold-01"
    type: "manifold"
    position: [15, 0, 20]
    zone_id: "z-water-infra"

  - asset_id: "valve-zone-core-01"
    type: "valve"
    position: [25, -0.3, 90]
    zone_id: "z-food-forest-core"
    mesh_capability: "actuator:valve:valve-zone-core-01"

  - asset_id: "valve-zone-flower-01"
    type: "valve"
    position: [25, -0.3, 170]
    zone_id: "z-flower-production"
    mesh_capability: "actuator:valve:valve-zone-flower-01"

  - asset_id: "valve-zone-rice-01"
